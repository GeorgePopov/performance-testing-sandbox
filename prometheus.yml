global:
  scrape_interval: 5s # Как часто Prometheus будет забирать метрики

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal позволяет контейнеру Prometheus достучаться до Java на твоем реальном ПК
      - targets: ['host.docker.internal:8080']

  - job_name: 'postgres-db'
    static_configs:
      # Стучимся к контейнеру экспортера внутри сети Docker на порт 9187
      - targets: ['postgres-exporter:9187']