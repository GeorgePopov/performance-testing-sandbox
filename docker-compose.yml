services:
  # Наша база данных. Сюда Java-приложение будет записывать результаты
  postgres:
    image: postgres:15
    container_name: my_postgres
    ports:
      - "5432:5432" # Открываем порт наружу, чтобы Java могла подключиться
    environment:
      POSTGRES_USER: user        # Логин для подключения
      POSTGRES_PASSWORD: password  # Пароль
      POSTGRES_DB: performance_db # Название базы данных
    volumes:
      - postgres_data:/var/lib/postgresql/data # Чтобы данные не удалялись при перезапуске

  # Системный компонент для работы Kafka (координатор)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: my_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Брокер сообщений Kafka. Сюда будут сыпаться запросы на обработку
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: my_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # --- ВОТ ЭТИ СТРОЧКИ ВАЖНО ОБНОВИТЬ ---
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- PROMETHEUS (Сборщик метрик) ---
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: my_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - postgres

  # Grafana — красивый визуализатор, где мы будем смотреть на графики
  grafana:
    image: grafana/grafana:10.0.0
    container_name: my_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
      # Добавляем автоматическую загрузку конфигов и дашбордов из папки проекта:
      - ./grafana/provisioning:/etc/grafana/provisioning

  # --- POSTGRES EXPORTER (Сборщик метрик БД) ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: my_postgres_exporter
    ports:
      - "9187:9187"
    environment:
      # ИСПРАВЛЕНО: Подставляем ТВОИ реальные логин, пароль и имя базы из блока postgres
      DATA_SOURCE_NAME: "postgresql://user:password@postgres:5432/performance_db?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_DATA: "true"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    depends_on:
      - postgres

  # --- INFLUXDB (Специальное хранилище для метрик JMeter) ---
  influxdb:
    image: influxdb:1.8.10
    container_name: my_influxdb
    ports:
      - "8086:8086" # Порт, куда JMeter будет отправлять данные
    environment:
      - INFLUXDB_DB=jmeter # Автоматически создать базу данных с именем jmeter
    volumes:
      - influxdb_storage:/var/lib/influxdb

# В самый-самый конец файла, где у тебя описаны volumes, добавь volume для Графаны:
volumes:
  postgres_data:
  grafana_storage:
  influxdb_storage: